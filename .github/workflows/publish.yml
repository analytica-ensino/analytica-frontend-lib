name: Publish Package

on:
  workflow_call:
    inputs:
      cache-key:
        description: "Cache key for node_modules"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          cache: yarn

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .yarn/cache
            .pnp.*
          key: ${{ inputs.cache-key }}
          fail-on-cache-miss: true

      - name: Bump patch version and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Bump the patch version in package.json only (no git tag).
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "Bumped to $NEW_VERSION"

          # Commit just the version bump back to main. [skip ci] prevents this
          # push from re-triggering the CI/publish pipeline (no infinite loop).
          git add package.json
          git commit -m "chore(release): $NEW_VERSION [skip ci]"

          # Rebase onto the latest main in case it moved since checkout, then push.
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Add exports to package.json
        run: yarn add:exports

      - name: Build JavaScript (ESM/CJS)
        run: rm -rf dist && yarn tsup
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build TypeScript declarations
        run: yarn build:types
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Read package version
        if: always()
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK_URL not configured; skipping Discord notification."
            exit 0
          fi
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          PAYLOAD=$(jq -n \
            --arg title "❌ Publicação npm falhou: $REPO" \
            --arg version "${PKG_VERSION:-desconhecida}" \
            --arg sha "$SHORT_SHA" \
            --arg author "$COMMIT_AUTHOR" \
            --arg url "$RUN_URL" \
            '{
              username: "GitHub Publish",
              embeds: [{
                title: $title,
                url: $url,
                color: 15158332,
                fields: [
                  { name: "Versão", value: $version, inline: true },
                  { name: "Commit", value: $sha, inline: true },
                  { name: "Autor", value: $author, inline: true }
                ]
              }]
            }')
          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK_URL not configured; skipping Discord notification."
            exit 0
          fi
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          PAYLOAD=$(jq -n \
            --arg title "✅ Publicação npm concluída: $REPO" \
            --arg version "$PKG_VERSION" \
            --arg sha "$SHORT_SHA" \
            --arg author "$COMMIT_AUTHOR" \
            --arg url "$RUN_URL" \
            '{
              username: "GitHub Publish",
              embeds: [{
                title: $title,
                url: $url,
                color: 3066993,
                fields: [
                  { name: "Versão", value: $version, inline: true },
                  { name: "Commit", value: $sha, inline: true },
                  { name: "Autor", value: $author, inline: true }
                ]
              }]
            }')
          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
